# Harithasuwa — Netlify static site + serverless contact API
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Contact form SMTP can take a moment on cold start
  included_files = ["server/**"]

# SPA client-side routing
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
